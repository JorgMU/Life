<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Game of Life</title>
  <!--
    Intention:
    1. Simple web page with a resizable canvas as the game board. By default the canvas
       should fill the available space excluding a left-nav with the controls.
    2. Drop down for selecting the initial pattern (e.g., random, glider, etc.).
    3. Control buttons fashioned after a media player (play, pause, step forward, reset).
    4. Display the current generation count and population size.
    5. Dot color based on age (e.g., younger cells are brighter, older cells are dimmer).
    6. Adjustable generation speed with a slider.
    7. Border mode toggle (wrap around vs. fixed edges).
    8. Responsive design to ensure it looks good on both desktop and mobile devices.
    9. I would like an added mode in the drop-down called Custom that clears the board and
       allows the user to click cells to toggle them alive/dead before starting the simulation.
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d0d0d;
      color: #c8f0c8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 200px;
      min-width: 180px;
      background: #141414;
      border-right: 1px solid #2a3a2a;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 12px;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #7fff7f;
      text-align: center;
      border-bottom: 1px solid #2a3a2a;
      padding-bottom: 10px;
    }

    #sidebar > label {
      font-size: 12px;
      color: #8aab8a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #sidebar select {
      width: 100%;
      background: #1e2e1e;
      color: #c8f0c8;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
      padding: 4px 6px;
    }

    #sidebar select:focus { outline: 1px solid #39ff14; }

    /* ── Media controls ── */
    #controls {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    #controls button {
      flex: 1;
      padding: 8px 0;
      background: #1e2e1e;
      color: #7fff7f;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }

    #controls button:hover  { background: #2a4a2a; }
    #controls button:active { background: #3a5a3a; }

    #controls button.active {
      background: #2a5a2a;
      border-color: #39ff14;
      color: #39ff14;
    }

    /* ── Stats ── */
    #stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      padding: 6px 8px;
      background: #1a1a1a;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
    }

    #stats span {
      color: #39ff14;
      font-weight: 600;
    }

    /* ── Sliders ── */
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-group label {
      font-size: 12px;
      color: #8aab8a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #39ff14;
    }

    .val {
      font-size: 12px;
      color: #7fff7f;
      min-width: 40px;
      text-align: right;
    }

    /* ── Wrap toggle ── */
    .check-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .check-group input[type="checkbox"] { accent-color: #39ff14; }
    .check-group label { color: #c8f0c8; text-transform: none; letter-spacing: 0; }

    /* ── Status box ── */
    #status-box {
      margin-top: auto;
      font-size: 12px;
      color: #9cc2ff;
      background: #111a2b;
      border: 1px solid #27456f;
      border-radius: 4px;
      min-height: 44px;
      padding: 8px;
      display: flex;
      align-items: center;
    }

    /* ── Canvas area ── */
    #game-canvas.custom-mode { cursor: crosshair; }

    #canvas-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Responsive: stack vertically on narrow screens ── */
    @media (max-width: 600px) {
      body { flex-direction: column; }

      #sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid #2a3a2a;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 8px;
        overflow-y: visible;
        overflow-x: auto;
      }

      #sidebar h1 {
        width: 100%;
        border-bottom: 1px solid #2a3a2a;
        padding-bottom: 6px;
      }

      #canvas-area { flex: 1; min-height: 0; }
    }
  </style>
</head>

<body>

  <nav id="sidebar">
    <h1>Game of Life</h1>

    <label for="pattern">Pattern</label>
    <select id="pattern">
      <option value="random">Random</option>
      <option value="custom">Custom</option>
      <option value="glider">Glider</option>
      <option value="blinker">Blinker</option>
      <option value="toad">Toad</option>
      <option value="beacon">Beacon</option>
      <option value="clock">Clock (P2)</option>
      <option value="pentadecathlon">Pentadecathlon (P15)</option>
      <option value="pulsar">Pulsar</option>
      <option value="gosper">Gosper Glider Gun</option>
    </select>

    <div id="controls">
      <button id="btn-play"  title="Play">&#9654;</button>
      <button id="btn-pause" title="Pause">&#9646;&#9646;</button>
      <button id="btn-step"  title="Step Forward">&#9197;</button>
      <button id="btn-reset" title="Reset">&#9632;</button>
      <button id="btn-edit" title="Edit">Edit</button>
    </div>

    <div id="stats">
      <div>Generation: <span id="gen-count">0</span></div>
      <div>Population: <span id="pop-count">0</span></div>
    </div>

    <div class="slider-group">
      <label for="speed">Speed</label>
      <div class="slider-row">
        <input type="range" id="speed" min="1" max="60" value="10" />
        <span class="val" id="speed-val">10 fps</span>
      </div>
    </div>

    <div class="slider-group">
      <label for="cell-size">Cell Size</label>
      <div class="slider-row">
        <input type="range" id="cell-size" min="4" max="24" value="10" />
        <span class="val" id="cell-size-val">10 px</span>
      </div>
    </div>

    <div class="check-group">
      <input type="checkbox" id="wrap-toggle" checked />
      <label for="wrap-toggle">Wrap edges</label>
    </div>

    <div id="status-box" aria-live="polite"></div>
  </nav>

  <main id="canvas-area">
    <canvas id="game-canvas"></canvas>
  </main>

  <script>
    // ── Constants ──────────────────────────────────────────────────
    const MAX_AGE = 40;
    const LOOP_TRACK_FRAMES = 36;

    // ── DOM refs ───────────────────────────────────────────────────
    const canvas     = document.getElementById('game-canvas');
    const ctx        = canvas.getContext('2d');
    const selPattern = document.getElementById('pattern');
    const btnPlay    = document.getElementById('btn-play');
    const btnPause   = document.getElementById('btn-pause');
    const btnStep    = document.getElementById('btn-step');
    const btnReset   = document.getElementById('btn-reset');
    const btnEdit    = document.getElementById('btn-edit');
    const elGen      = document.getElementById('gen-count');
    const elPop      = document.getElementById('pop-count');
    const elStatus   = document.getElementById('status-box');
    const sldSpeed   = document.getElementById('speed');
    const valSpeed   = document.getElementById('speed-val');
    const sldCell    = document.getElementById('cell-size');
    const valCell    = document.getElementById('cell-size-val');
    const chkWrap    = document.getElementById('wrap-toggle');
    const canvasArea = document.getElementById('canvas-area');

    // ── State ──────────────────────────────────────────────────────
    let cols = 0, rows = 0;
    let grid = [];          // 2-D: grid[row][col] = age (0 = dead, 1+ = alive N gens)
    let generation = 0;
    let population  = 0;
    let running    = false;
    let animId     = null;
    let lastTime   = 0;
    let cellSize   = parseInt(sldCell.value, 10);
    let fps        = parseInt(sldSpeed.value, 10);
    let wrapEdges  = chkWrap.checked;
    let customMode    = false;
    let customPainting = false;
    let customPaintVal = 0;
    let loopHashes     = new Uint32Array(LOOP_TRACK_FRAMES);
    let loopHashCount  = 0;
    let loopHashWrite  = 0;

    // ── Color table (pre-computed) ─────────────────────────────────
    // Age 1 (new) → bright green; Age MAX_AGE (old) → dim green
    const colorTable = [''];   // index 0 unused (dead)
    for (let a = 1; a <= MAX_AGE; a++) {
      const t = (a - 1) / (MAX_AGE - 1);           // 0 = new, 1 = old
      const l = Math.round(72 - t * 47);            // lightness 72% → 25%
      const s = Math.round(100 - t * 35);           // saturation 100% → 65%
      colorTable.push(`hsl(145,${s}%,${l}%)`);
    }

    // ── Grid helpers ───────────────────────────────────────────────
    function makeGrid() {
      return Array.from({ length: rows }, () => new Int16Array(cols));
    }

    function getCell(g, c, r) {
      if (wrapEdges) {
        c = ((c % cols) + cols) % cols;
        r = ((r % rows) + rows) % rows;
      } else {
        if (c < 0 || c >= cols || r < 0 || r >= rows) return 0;
      }
      return g[r][c];
    }

    function setCell(g, c, r, val) {
      if (c >= 0 && c < cols && r >= 0 && r < rows) g[r][c] = val;
    }

    function countNeighbors(g, c, r) {
      let n = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          if ((dr !== 0 || dc !== 0) && getCell(g, c + dc, r + dr) > 0) n++;
      return n;
    }

    // ── Patterns ──────────────────────────────────────────────────
    const PATTERNS = {
      random() {
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            grid[r][c] = Math.random() < 0.3 ? 1 : 0;
      },
      glider() {
        const oc = Math.floor(cols / 2) - 1, or = Math.floor(rows / 2) - 1;
        [[1,0],[2,1],[0,2],[1,2],[2,2]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      blinker() {
        const oc = Math.floor(cols / 2) - 1, or = Math.floor(rows / 2);
        [[0,0],[1,0],[2,0]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      toad() {
        const oc = Math.floor(cols / 2) - 2, or = Math.floor(rows / 2) - 1;
        [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      beacon() {
        const oc = Math.floor(cols / 2) - 2, or = Math.floor(rows / 2) - 2;
        [[0,0],[1,0],[0,1],[3,2],[2,3],[3,3]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      clock() {
        const oc = Math.floor(cols / 2) - 2, or = Math.floor(rows / 2) - 2;
        // Period-2 oscillator (clock)
        [
          [1,0],[2,0],
          [0,1],[3,1],
          [0,2],[3,2],
          [1,3],[2,3]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      pentadecathlon() {
        const oc = Math.floor(cols / 2) - 5, or = Math.floor(rows / 2) - 1;
        // True period-15 pentadecathlon (12 cells)
        [
          [2,0],[7,0],
          [0,1],[1,1],[3,1],[4,1],[5,1],[6,1],[8,1],[9,1],
          [2,2],[7,2]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      pulsar() {
        const oc = Math.floor(cols / 2) - 6, or = Math.floor(rows / 2) - 6;
        [
          [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
          [0,2],[5,2],[7,2],[12,2],[0,3],[5,3],[7,3],[12,3],[0,4],[5,4],[7,4],[12,4],
          [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
          [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
          [0,8],[5,8],[7,8],[12,8],[0,9],[5,9],[7,9],[12,9],[0,10],[5,10],[7,10],[12,10],
          [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      gosper() {
        const oc = Math.max(1, Math.floor((cols - 38) / 2));
        const or = Math.max(1, Math.floor((rows - 11) / 2));
        [
          [1,5],[2,5],[1,6],[2,6],
          [11,5],[11,6],[11,7],[12,4],[12,8],[13,3],[13,9],[14,3],[14,9],[15,6],
          [16,4],[16,8],[17,5],[17,6],[17,7],[18,6],
          [21,3],[21,4],[21,5],[22,3],[22,4],[22,5],[23,2],[23,6],
          [25,1],[25,2],[25,6],[25,7],
          [35,3],[35,4],[36,3],[36,4]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
      },
      custom() {
        // Board is cleared by applyPattern(); user draws cells by clicking
      }
    };

    function applyPattern() {
      grid = makeGrid();
      generation = 0;
      population  = 0;
      resetLoopHistory();
      const fn = PATTERNS[selPattern.value];
      if (fn) fn();
      recountPop();
      updateStats();
    }

    // ── Simulation step ───────────────────────────────────────────
    function step() {
      const next = makeGrid();
      let pop = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const alive = grid[r][c] > 0;
          const n = countNeighbors(grid, c, r);
          let age = 0;
          if (alive)  age = (n === 2 || n === 3) ? Math.min(grid[r][c] + 1, MAX_AGE) : 0;
          else        age = (n === 3) ? 1 : 0;
          next[r][c] = age;
          if (age > 0) pop++;
        }
      }
      grid = next;
      generation++;
      population = pop;
    }

    // ── Render ────────────────────────────────────────────────────
    function draw() {
      // Blue grid lines: fill canvas blue, then paint each cell (cellSize-1 sq)
      // so the 1px gaps between cells show as blue lines.
      ctx.fillStyle = '#0d2a4a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const age = grid[r][c];
          ctx.fillStyle = age > 0 ? (colorTable[age] ?? colorTable[MAX_AGE]) : '#0d0d0d';
          ctx.fillRect(c * cellSize, r * cellSize, cellSize - 1, cellSize - 1);
        }
      }
    }

    function recountPop() {
      let p = 0;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (grid[r][c] > 0) p++;
      population = p;
    }

    function updateStats() {
      elGen.textContent = generation;
      elPop.textContent = population;
    }

    function setStatus(text = '') {
      elStatus.textContent = text;
    }

    // ── Grid hashing (fast 32-bit FNV-1a over all cells) ──────────
    function hashGrid(g) {
      let h = 0x811c9dc5;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          h ^= (g[r][c] > 0 ? 1 : 0);
          h = (Math.imul(h, 0x01000193) >>> 0);
        }
      }
      return h;
    }

    function resetLoopHistory() {
      loopHashCount = 0;
      loopHashWrite = 0;
    }

    function pushLoopHash(hash) {
      loopHashes[loopHashWrite] = hash;
      loopHashWrite = (loopHashWrite + 1) % LOOP_TRACK_FRAMES;
      if (loopHashCount < LOOP_TRACK_FRAMES) loopHashCount++;
    }

    function findLoopPeriod(hash) {
      for (let offset = 1; offset <= loopHashCount; offset++) {
        const idx = (loopHashWrite - offset + LOOP_TRACK_FRAMES) % LOOP_TRACK_FRAMES;
        if (loopHashes[idx] === hash) return offset;
      }
      return 0;
    }

    // ── Animation loop ────────────────────────────────────────────
    function loop(ts) {
      if (!running) return;
      animId = requestAnimationFrame(loop);
      if (ts - lastTime >= 1000 / fps) {
        lastTime = ts;

        step();
        draw();
        updateStats();

        const h = hashGrid(grid);
        const period = findLoopPeriod(h);

        if (period === 1) {
          console.log(`[Life] Steady state at gen ${generation}. Auto-pausing.`);
          setStatus('Loop detected, paused. (steady state)');
          pause();
          return;
        }

        if (period > 1) {
          console.log(`[Life] Period-${period} loop at gen ${generation}. Auto-pausing.`);
          setStatus(`Loop detected, paused. (period-${period})`);
          pause();
          return;
        }

        pushLoopHash(h);
      }
    }

    function play() {
      if (running) return;
      // Start detection history from the current board state.
      resetLoopHistory();
      pushLoopHash(hashGrid(grid));
      setStatus('');
      running = true;
      lastTime = 0;
      btnPlay.classList.add('active');
      btnPause.classList.remove('active');
      animId = requestAnimationFrame(loop);
    }

    function pause() {
      running = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      btnPause.classList.add('active');
      btnPlay.classList.remove('active');
    }

    function enterEditMode() {
      pause();
      customPainting = false;
      customMode = true;
      selPattern.value = 'custom';
      canvas.classList.add('custom-mode');
      draw();
    }

    // ── Resize ────────────────────────────────────────────────────
    function resize() {
      const w = canvasArea.clientWidth;
      const h = canvasArea.clientHeight;
      canvas.width  = w;
      canvas.height = h;
      const newCols = Math.floor(w / cellSize);
      const newRows = Math.floor(h / cellSize);
      if (newCols !== cols || newRows !== rows) {
        cols = newCols;
        rows = newRows;
        applyPattern();
      }
      draw();
    }

    // ── Event listeners ───────────────────────────────────────────
    btnPlay.addEventListener('click', play);
    btnPause.addEventListener('click', pause);

    btnStep.addEventListener('click', () => {
      pause();
      step();
      draw();
      updateStats();
    });

    btnReset.addEventListener('click', () => {
      pause();
      applyPattern();
      draw();
    });

    btnEdit.addEventListener('click', () => {
      enterEditMode();
    });

    selPattern.addEventListener('change', () => {
      pause();
      customMode = selPattern.value === 'custom';
      canvas.classList.toggle('custom-mode', customMode);
      applyPattern();
      draw();
    });

    sldSpeed.addEventListener('input', () => {
      fps = parseInt(sldSpeed.value, 10);
      valSpeed.textContent = `${fps} fps`;
    });

    // Resize only recalculates the grid on mouseup to avoid thrashing
    sldCell.addEventListener('change', () => {
      cellSize = parseInt(sldCell.value, 10);
      valCell.textContent = `${cellSize} px`;
      resize();
    });

    chkWrap.addEventListener('change', () => { wrapEdges = chkWrap.checked; });

    // ── Custom draw mode ──────────────────────────────────────────
    function canvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        c: Math.floor((e.clientX - rect.left) * (canvas.width  / rect.width)  / cellSize),
        r: Math.floor((e.clientY - rect.top)  * (canvas.height / rect.height) / cellSize)
      };
    }

    canvas.addEventListener('pointerdown', e => {
      if (!customMode || running) return;
      const { c, r } = canvasCoords(e);
      if (c < 0 || c >= cols || r < 0 || r >= rows) return;
      customPaintVal = grid[r][c] > 0 ? 0 : 1;
      grid[r][c] = customPaintVal;
      customPainting = true;
      canvas.setPointerCapture(e.pointerId);
      recountPop(); updateStats(); draw();
    });

    canvas.addEventListener('pointermove', e => {
      if (!customMode || !customPainting) return;
      const { c, r } = canvasCoords(e);
      if (c < 0 || c >= cols || r < 0 || r >= rows) return;
      if (grid[r][c] === customPaintVal) return;
      grid[r][c] = customPaintVal;
      recountPop(); updateStats(); draw();
    });

    canvas.addEventListener('pointerup',     () => { customPainting = false; });
    canvas.addEventListener('pointercancel', () => { customPainting = false; });

    new ResizeObserver(resize).observe(canvasArea);

    // ── Init ──────────────────────────────────────────────────────
    resize();
  </script>

</body>

</html>
