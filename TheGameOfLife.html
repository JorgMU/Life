<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Game of Life</title>
  <!--
    Intention:
    1. Simple web page with a resizable canvas as the game board. By default the canvas
       should fill the available space excluding a left-nav with the controls.
    2. Drop down for selecting the initial pattern (e.g., random, glider, etc.).
    3. Control buttons fashioned after a media player (play, pause, step forward, reset).
    4. Display the current generation count and population size.
    5. Dot color based on age (e.g., younger cells are brighter, older cells are dimmer).
    6. Adjustable generation speed with a slider.
    7. Border mode toggle (wrap around vs. fixed edges).
    8. Responsive design to ensure it looks good on both desktop and mobile devices.
    9. I would like an added mode in the drop-down called Custom that clears the board and
       allows the user to click cells to toggle them alive/dead before starting the simulation.
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d0d0d;
      color: #c8f0c8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 200px;
      min-width: 180px;
      background: #141414;
      border-right: 1px solid #2a3a2a;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 12px;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #7fff7f;
      text-align: center;
      border-bottom: 1px solid #2a3a2a;
      padding-bottom: 10px;
    }

    #sidebar > label {
      font-size: 12px;
      color: #8aab8a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #sidebar select {
      width: 100%;
      background: #1e2e1e;
      color: #c8f0c8;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
      padding: 4px 6px;
    }

    #sidebar select:focus { outline: 1px solid #39ff14; }

    /* ── Media controls ── */
    #controls {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    #controls button {
      flex: 1;
      padding: 8px 0;
      background: #1e2e1e;
      color: #7fff7f;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }

    #controls button:hover  { background: #2a4a2a; }
    #controls button:active { background: #3a5a3a; }

    #controls button.active {
      background: #2a5a2a;
      border-color: #39ff14;
      color: #39ff14;
    }

    /* ── Stats ── */
    #stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      padding: 6px 8px;
      background: #1a1a1a;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
    }

    #stats span {
      color: #39ff14;
      font-weight: 600;
    }

    /* ── Sliders ── */
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-group label {
      font-size: 12px;
      color: #8aab8a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #39ff14;
    }

    .val {
      font-size: 12px;
      color: #7fff7f;
      min-width: 40px;
      text-align: right;
    }

    /* ── Wrap toggle ── */
    .check-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .check-group input[type="checkbox"] { accent-color: #39ff14; }
    .check-group label { color: #c8f0c8; text-transform: none; letter-spacing: 0; }

    #window-mode {
      width: 100%;
      background: #1e2e1e;
      color: #c8f0c8;
      border: 1px solid #2a3a2a;
      border-radius: 4px;
      padding: 4px 6px;
    }

    #window-mode:focus { outline: 1px solid #39ff14; }

    /* ── Status box ── */
    #status-box {
      margin-top: auto;
      font-size: 12px;
      color: #9cc2ff;
      background: #111a2b;
      border: 1px solid #27456f;
      border-radius: 4px;
      min-height: 44px;
      padding: 8px;
      display: flex;
      align-items: center;
    }

    #hover-box {
      margin-top: 10px;
      font-size: 12px;
      color: #a8c9e7;
      min-height: 18px;
    }

    /* ── Canvas area ── */
    #game-canvas.custom-mode { cursor: crosshair; }

    #canvas-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Responsive: stack vertically on narrow screens ── */
    @media (max-width: 600px) {
      body { flex-direction: column; }

      #sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid #2a3a2a;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 8px;
        overflow-y: visible;
        overflow-x: auto;
      }

      #sidebar h1 {
        width: 100%;
        border-bottom: 1px solid #2a3a2a;
        padding-bottom: 6px;
      }

      #canvas-area { flex: 1; min-height: 0; }
    }
  </style>
</head>

<body>

  <nav id="sidebar">
    <h1>Game of Life</h1>
    <p><a href="https://en.wikipedia.org/wiki/Conway%27s_Game_of_Life" target="_blank" rel="noopener noreferrer">Conway's Game of Life</a></p>

    <label for="pattern">Pattern</label>
    <select id="pattern">
      <option value="random">Random</option>
      <option value="custom">Custom</option>
      <option value="simple-complexity">Simple Complexity</option>
      <option value="glider">Glider</option>
      <option value="blinker">Blinker</option>
      <option value="toad">Toad</option>
      <option value="beacon">Beacon</option>
      <option value="clock">Clock (Stable)</option>
      <option value="pentadecathlon">Pentadecathlon (P15)</option>
      <option value="pulsar">Pulsar</option>
      <option value="gosper">Gosper Glider Gun</option>
      <option value="rpentomino">R-Pentomino</option>
      <option value="acorn">Acorn</option>
    </select>

    <div id="controls">
      <button id="btn-play"  title="Play">&#9654;</button>
      <button id="btn-pause" title="Pause">&#9646;&#9646;</button>
      <button id="btn-step"  title="Step Forward">&#9197;</button>
      <button id="btn-reset" title="Reset to selected pattern">&#9632;</button>
      <button id="btn-edit" title="Edit">Edit</button>
    </div>

    <div id="stats">
      <div>Generation: <span id="gen-count">0</span></div>
      <div>Population: <span id="pop-count">0</span></div>
      <div>Grid: <span id="grid-size">0 x 0</span></div>
    </div>

    <div class="slider-group">
      <label for="speed">Speed</label>
      <div class="slider-row">
        <input type="range" id="speed" min="1" max="60" value="10" />
        <span class="val" id="speed-val">10 fps</span>
      </div>
    </div>

    <div class="slider-group">
      <label for="cell-size">Cell Size</label>
      <div class="slider-row">
        <input type="range" id="cell-size" min="2" max="24" value="10" />
        <span class="val" id="cell-size-val">10 px</span>
      </div>
    </div>

    <div class="check-group">
      <input type="checkbox" id="wrap-toggle" checked />
      <label for="wrap-toggle">Wrap edges</label>
    </div>

    <div class="check-group">
      <input type="checkbox" id="detect-loops" checked />
      <label for="detect-loops">Detect loops</label>
    </div>

    <div class="check-group">
      <input type="checkbox" id="url-sync" />
      <label for="url-sync">Save grid in URL</label>
    </div>

    <div class="slider-group">
      <label for="window-mode">Window</label>
      <select id="window-mode" title="Window mode and frameless size presets">
        <option value="regular">Regular Window</option>
        <option value="small-square">Small Square</option>
        <option value="small-wide">Small Wide</option>
        <option value="medium-square">Medium Square</option>
        <option value="medium-wide">Medium Wide</option>
        <option value="large-square">Large Square</option>
        <option value="large-wide">Large Wide</option>
      </select>
    </div>

    <div id="hover-box" aria-live="polite">Hover: x -, y -</div>
    <div id="status-box" aria-live="polite"></div>
  </nav>

  <main id="canvas-area">
    <canvas id="game-canvas"></canvas>
  </main>

  <script>
    // ── Constants ──────────────────────────────────────────────────
    const MAX_AGE = 40;
    const LOOP_TRACK_FRAMES = 36;
    const POPUP_SIDEBAR_WIDTH = 200;
    const POPUP_HEIGHT_CHROME = 70;
    const POPUP_WIDTH_CHROME = 24;
    const WINDOW_PRESETS = {
      'small-square': { cols: 40, rows: 40, cellSize: 10, label: 'Small Square' },
      'small-wide': { cols: 60, rows: 40, cellSize: 10, label: 'Small Wide' },
      'medium-square': { cols: 70, rows: 70, cellSize: 10, label: 'Medium Square' },
      'medium-wide': { cols: 90, rows: 60, cellSize: 10, label: 'Medium Wide' },
      'large-square': { cols: 100, rows: 100, cellSize: 8, label: 'Large Square' },
      'large-wide': { cols: 100, rows: 75, cellSize: 8, label: 'Large Wide' }
    };
    const POPUP_STATE_KEY = 'life-popout-state';
    const URL_STATE_PARAM = 'state';
    const IN_POPUP_MODE = new URLSearchParams(window.location.search).get('popup') === '1';

    // ── DOM refs ───────────────────────────────────────────────────
    const canvas     = document.getElementById('game-canvas');
    const ctx        = canvas.getContext('2d');
    const selPattern = document.getElementById('pattern');
    const btnPlay    = document.getElementById('btn-play');
    const btnPause   = document.getElementById('btn-pause');
    const btnStep    = document.getElementById('btn-step');
    const btnReset   = document.getElementById('btn-reset');
    const btnEdit    = document.getElementById('btn-edit');
    const selWindow  = document.getElementById('window-mode');
    const elGen      = document.getElementById('gen-count');
    const elPop      = document.getElementById('pop-count');
    const elGridSize = document.getElementById('grid-size');
    const elHover    = document.getElementById('hover-box');
    const elStatus   = document.getElementById('status-box');
    const sldSpeed   = document.getElementById('speed');
    const valSpeed   = document.getElementById('speed-val');
    const sldCell    = document.getElementById('cell-size');
    const valCell    = document.getElementById('cell-size-val');
    const chkWrap    = document.getElementById('wrap-toggle');
    const chkDetect  = document.getElementById('detect-loops');
    const chkUrlSync = document.getElementById('url-sync');
    const canvasArea = document.getElementById('canvas-area');

    // ── State ──────────────────────────────────────────────────────
    let cols = 0, rows = 0;
    let grid = [];          // 2-D: grid[row][col] = age (0 = dead, 1+ = alive N gens)
    let generation = 0;
    let population  = 0;
    let running    = false;
    let animId     = null;
    let lastTime   = 0;
    let cellSize   = parseInt(sldCell.value, 10);
    let fps        = parseInt(sldSpeed.value, 10);
    let wrapEdges  = chkWrap.checked;
    let detectLoops = chkDetect.checked;
    let customMode    = false;
    let customPainting = false;
    let customPaintVal = 0;
    let loopHashes     = new Uint32Array(LOOP_TRACK_FRAMES);
    let loopHashCount  = 0;
    let loopHashWrite  = 0;
    let rowBiasFlip    = false;
    let colBiasFlip    = false;
    let urlSyncEnabled = false;
    let urlSyncTimer   = null;
    let runStartTimeMs = 0;
    let runStartGeneration = 0;

    // ── Color table (pre-computed) ─────────────────────────────────
    // Age 1 (new) → bright green; Age MAX_AGE (old) → dim green
    const colorTable = [''];   // index 0 unused (dead)
    for (let a = 1; a <= MAX_AGE; a++) {
      const t = (a - 1) / (MAX_AGE - 1);           // 0 = new, 1 = old
      const l = Math.round(72 - t * 47);            // lightness 72% → 25%
      const s = Math.round(100 - t * 35);           // saturation 100% → 65%
      colorTable.push(`hsl(145,${s}%,${l}%)`);
    }

    // ── Grid helpers ───────────────────────────────────────────────
    function makeGrid() {
      return Array.from({ length: rows }, () => new Int16Array(cols));
    }

    function getCell(g, c, r) {
      if (wrapEdges) {
        c = ((c % cols) + cols) % cols;
        r = ((r % rows) + rows) % rows;
      } else {
        if (c < 0 || c >= cols || r < 0 || r >= rows) return 0;
      }
      return g[r][c];
    }

    function setCell(g, c, r, val) {
      if (c >= 0 && c < cols && r >= 0 && r < rows) g[r][c] = val;
    }

    function centeredOffsets(oldSize, newSize, flipBias) {
      const delta = newSize - oldSize;
      const odd = Math.abs(delta) % 2 === 1;
      const bias = odd && flipBias ? 1 : 0;

      if (delta >= 0) {
        // Expanding: place old content near center of new grid.
        return {
          srcStart: 0,
          dstStart: Math.floor(delta / 2) + bias,
          copySize: oldSize,
          usedOdd: odd
        };
      }

      // Shrinking: crop from near center of old grid.
      const cut = -delta;
      return {
        srcStart: Math.floor(cut / 2) + bias,
        dstStart: 0,
        copySize: newSize,
        usedOdd: odd
      };
    }

    function resizeGridPreserve(oldGrid, oldCols, oldRows, newCols, newRows) {
      const next = Array.from({ length: newRows }, () => new Int16Array(newCols));
      const rowMap = centeredOffsets(oldRows, newRows, rowBiasFlip);
      const colMap = centeredOffsets(oldCols, newCols, colBiasFlip);

      for (let r = 0; r < rowMap.copySize; r++) {
        for (let c = 0; c < colMap.copySize; c++) {
          next[r + rowMap.dstStart][c + colMap.dstStart] =
            oldGrid[r + rowMap.srcStart][c + colMap.srcStart];
        }
      }

      if (rowMap.usedOdd) rowBiasFlip = !rowBiasFlip;
      if (colMap.usedOdd) colBiasFlip = !colBiasFlip;

      return next;
    }

    function countNeighbors(g, c, r) {
      let n = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          if ((dr !== 0 || dc !== 0) && getCell(g, c + dc, r + dr) > 0) n++;
      return n;
    }

    // ── Patterns ──────────────────────────────────────────────────
    const PATTERNS = {
      random() {
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            grid[r][c] = Math.random() < 0.3 ? 1 : 0;
      },
      'simple-complexity'() {
        const Message = 'Recommended grid: 110 × 96 (recommended for this shifted setup).';
        const ShiftX = -16;
        const ShiftY = 0;
        const oc = Math.floor(cols / 2) - 5 + ShiftX;
        const or = Math.floor(rows / 2) - 1 - ShiftY;

        // Matches canonical shared state: a tub above a glider seed.
        [[4,-5],[3,-4],[5,-4],[4,-3]].forEach(([dc,dr]) => setCell(grid, oc + dc, or + dr, 1));
        [[0,0],[1,0],[2,0],[2,1],[1,2]].forEach(([dc,dr]) => setCell(grid, oc + dc, or + dr, 1));
        return Message;
      },
      glider() {
        const Message = 'Min size: 5 × 5 (minimum to travel freely).';
        const oc = Math.floor(cols / 2) - 1, or = Math.floor(rows / 2) - 1;
        [[1,0],[2,1],[0,2],[1,2],[2,2]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      blinker() {
        const Message = 'Min size: 3 × 3 (period-2 oscillator).';
        const oc = Math.floor(cols / 2) - 1, or = Math.floor(rows / 2);
        [[0,0],[1,0],[2,0]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      toad() {
        const Message = 'Min size: 6 × 4 (period-2 oscillator).';
        const oc = Math.floor(cols / 2) - 2, or = Math.floor(rows / 2) - 1;
        [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      beacon() {
        const Message = 'Min size: 4 × 4 (period-2 oscillator).';
        const oc = Math.floor(cols / 2) - 2, or = Math.floor(rows / 2) - 2;
        [[0,0],[1,0],[0,1],[3,2],[2,3],[3,3]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      clock() {
        const Message = 'Min size: 4 × 4 (period-2 oscillator).';
        const oc = Math.floor(cols / 2) - 2, or = Math.floor(rows / 2) - 2;
        // Period-2 oscillator (clock)
        [
          [1,0],[2,0],
          [0,1],[3,1],
          [0,2],[3,2],
          [1,3],[2,3]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      pentadecathlon() {
        const Message = 'Min size: 12 × 5 (period-15 oscillator).';
        const oc = Math.floor(cols / 2) - 5, or = Math.floor(rows / 2) - 1;
        // True period-15 pentadecathlon (12 cells)
        [
          [2,0],[7,0],
          [0,1],[1,1],[3,1],[4,1],[5,1],[6,1],[8,1],[9,1],
          [2,2],[7,2]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      pulsar() {
        const Message = 'Min size: 15 × 15 (period-3 oscillator).';
        const oc = Math.floor(cols / 2) - 6, or = Math.floor(rows / 2) - 6;
        [
          [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
          [0,2],[5,2],[7,2],[12,2],[0,3],[5,3],[7,3],[12,3],[0,4],[5,4],[7,4],[12,4],
          [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
          [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
          [0,8],[5,8],[7,8],[12,8],[0,9],[5,9],[7,9],[12,9],[0,10],[5,10],[7,10],[12,10],
          [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      gosper() {
        const Message = 'Min size: 55 × 20 (gliders need room before looping back).';
        const oc = Math.max(1, Math.floor((cols - 38) / 2));
        const or = Math.max(1, Math.floor((rows - 11) / 2));
        [
          [1,5],[2,5],[1,6],[2,6],
          [11,5],[11,6],[11,7],[12,4],[12,8],[13,3],[13,9],[14,3],[14,9],[15,6],
          [16,4],[16,8],[17,5],[17,6],[17,7],[18,6],
          [21,3],[21,4],[21,5],[22,3],[22,4],[22,5],[23,2],[23,6],
          [25,1],[25,2],[25,6],[25,7],
          [35,3],[35,4],[36,3],[36,4]
        ].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      rpentomino() {
        const Message = 'Min size: 67 × 67 (stabilizes at gen 1,103).';
        // Methuselah: 5 cells, stabilises after 1,103 generations
        const oc = Math.floor(cols / 2) - 1, or = Math.floor(rows / 2) - 1;
        [[1,0],[2,0],[0,1],[1,1],[1,2]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      acorn() {
        const Message = 'Min size: 200 × 200 (temporary; pending more testing).';
        const ShiftX = 25;
        const ShiftY = -10;
        // Methuselah: 7 cells, stabilises after 5,206 generations
        const oc = Math.floor(cols / 2) - 3 + ShiftX, or = Math.floor(rows / 2) - 1 - ShiftY;
        [[1,0],[3,1],[0,2],[1,2],[4,2],[5,2],[6,2]].forEach(([dc,dr]) => setCell(grid, oc+dc, or+dr, 1));
        return Message;
      },
      custom() {
        // Board is cleared by applyPattern(); user draws cells by clicking
      }
    };

    function applyPattern() {
      grid = makeGrid();
      generation = 0;
      population  = 0;
      resetLoopHistory();
      const fn = PATTERNS[selPattern.value];
      const Message = fn ? fn() : '';
      recountPop();
      updateStats();
      if (typeof Message === 'string' && Message.length > 0) {
        setStatus(Message);
        return;
      }
      setStatus('');
    }

    // ── Simulation step ───────────────────────────────────────────
    function step() {
      const next = makeGrid();
      let pop = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const alive = grid[r][c] > 0;
          const n = countNeighbors(grid, c, r);
          let age = 0;
          if (alive)  age = (n === 2 || n === 3) ? Math.min(grid[r][c] + 1, MAX_AGE) : 0;
          else        age = (n === 3) ? 1 : 0;
          next[r][c] = age;
          if (age > 0) pop++;
        }
      }
      grid = next;
      generation++;
      population = pop;
    }

    // ── Render ────────────────────────────────────────────────────
    function drawGridToContext(targetCtx, targetCanvas) {
      // Blue grid lines: fill canvas blue, then paint each cell (cellSize-1 sq)
      // so the 1px gaps between cells show as blue lines.
      targetCtx.fillStyle = '#0d2a4a';
      targetCtx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const age = grid[r][c];
          targetCtx.fillStyle = age > 0 ? (colorTable[age] ?? colorTable[MAX_AGE]) : '#0d0d0d';
          targetCtx.fillRect(c * cellSize, r * cellSize, cellSize - 1, cellSize - 1);
        }
      }
    }

    function draw() {
      drawGridToContext(ctx, canvas);
    }

    function makeSnapshot() {
      return {
        cols,
        rows,
        generation,
        population,
        cellSize,
        fps,
        wrapEdges,
        detectLoops,
        windowMode: selWindow.value,
        pattern: selPattern.value,
        customMode,
        running,
        grid: grid.map(row => Array.from(row))
      };
    }

    function encodeBase64Url(text) {
      const bytes = new TextEncoder().encode(text);
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function decodeBase64Url(text) {
      const base64 = text.replace(/-/g, '+').replace(/_/g, '/');
      const padded = base64 + '='.repeat((4 - (base64.length % 4)) % 4);
      const bin = atob(padded);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    function encodeGridRle(g) {
      const total = rows * cols;
      if (total <= 0) return '';

      const tokens = [];
      let runVal = g[0][0] | 0;
      let runLen = 1;

      for (let idx = 1; idx < total; idx++) {
        const r = Math.floor(idx / cols);
        const c = idx % cols;
        const v = g[r][c] | 0;
        if (v === runVal) {
          runLen++;
        } else {
          tokens.push(`${runLen.toString(36)}.${runVal.toString(36)}`);
          runVal = v;
          runLen = 1;
        }
      }

      tokens.push(`${runLen.toString(36)}.${runVal.toString(36)}`);
      return tokens.join(',');
    }

    function decodeGridRle(encoded, srcCols, srcRows) {
      const total = srcCols * srcRows;
      const out = new Int16Array(total);
      if (!encoded || total <= 0) return out;

      const tokens = encoded.split(',');
      let write = 0;
      for (const token of tokens) {
        if (!token) continue;
        const parts = token.split('.');
        if (parts.length !== 2) continue;
        const len = parseInt(parts[0], 36);
        const val = parseInt(parts[1], 36);
        if (!Number.isFinite(len) || len <= 0 || !Number.isFinite(val)) continue;

        const maxWrite = Math.min(total, write + len);
        for (let i = write; i < maxWrite; i++) out[i] = val;
        write = maxWrite;
        if (write >= total) break;
      }

      return out;
    }

    function serializeStateForUrl() {
      const payload = {
        v: 1,
        c: cols,
        r: rows,
        cs: cellSize,
        f: fps,
        w: wrapEdges ? 1 : 0,
        d: detectLoops ? 1 : 0,
        p: selPattern.value,
        cm: customMode ? 1 : 0,
        run: running ? 1 : 0,
        g: generation,
        wm: selWindow.value,
        gh: encodeGridRle(grid)
      };
      return encodeBase64Url(JSON.stringify(payload));
    }

    function applyStatePayload(payload) {
      if (!payload || !Number.isFinite(payload.c) || !Number.isFinite(payload.r)) return false;

      cellSize = Number(payload.cs) || cellSize;
      fps = Number(payload.f) || fps;
      wrapEdges = !!payload.w;
      detectLoops = !!payload.d;
      customMode = !!payload.cm;

      if (typeof payload.wm === 'string') selWindow.value = payload.wm;
      if (typeof payload.p === 'string') selPattern.value = payload.p;

      sldCell.value = String(cellSize);
      valCell.textContent = `${cellSize} px`;
      sldSpeed.value = String(fps);
      valSpeed.textContent = `${fps} fps`;
      chkWrap.checked = wrapEdges;
      chkDetect.checked = detectLoops;
      canvas.classList.toggle('custom-mode', customMode);

      resize();

      const srcCols = Number(payload.c) | 0;
      const srcRows = Number(payload.r) | 0;
      const srcFlat = decodeGridRle(payload.gh || '', srcCols, srcRows);
      const restored = makeGrid();
      const rowOffsetDst = Math.floor((rows - srcRows) / 2);
      const colOffsetDst = Math.floor((cols - srcCols) / 2);

      for (let r = 0; r < srcRows; r++) {
        const rr = r + rowOffsetDst;
        if (rr < 0 || rr >= rows) continue;
        for (let c = 0; c < srcCols; c++) {
          const cc = c + colOffsetDst;
          if (cc < 0 || cc >= cols) continue;
          const srcIdx = r * srcCols + c;
          restored[rr][cc] = srcFlat[srcIdx] > 0 ? srcFlat[srcIdx] : 0;
        }
      }

      grid = restored;
      generation = Number.isFinite(payload.g) ? payload.g : generation;
      recountPop();
      draw();
      updateStats();

      if (payload.run) play();
      else pause();

      return true;
    }

    function tryRestoreFromUrlState() {
      const params = new URLSearchParams(window.location.search);
      const state = params.get(URL_STATE_PARAM);
      if (!state) return false;

      try {
        const json = decodeBase64Url(state);
        const payload = JSON.parse(json);
        if (!applyStatePayload(payload)) return false;
        chkUrlSync.checked = true;
        urlSyncEnabled = true;
        return true;
      } catch {
        return false;
      }
    }

    function syncStateToUrl() {
      const url = new URL(window.location.href);
      if (!urlSyncEnabled) {
        url.searchParams.delete(URL_STATE_PARAM);
        history.replaceState(null, '', url);
        return;
      }

      const encoded = serializeStateForUrl();
      url.searchParams.set(URL_STATE_PARAM, encoded);
      history.replaceState(null, '', url);
    }

    function requestUrlSync() {
      if (!urlSyncEnabled) return;
      if (urlSyncTimer !== null) return;

      urlSyncTimer = setTimeout(() => {
        urlSyncTimer = null;
        syncStateToUrl();
      }, 160);
    }

    function getWindowPreset(value) {
      return WINDOW_PRESETS[value] || null;
    }

    function popupDimensionsFromPreset(preset) {
      const popupWidth = Math.max(640, preset.cols * preset.cellSize + POPUP_SIDEBAR_WIDTH + POPUP_WIDTH_CHROME);
      const popupHeight = Math.max(520, preset.rows * preset.cellSize + POPUP_HEIGHT_CHROME);
      return { popupWidth, popupHeight };
    }

    function applyPresetCellSize(preset) {
      if (!preset || !Number.isFinite(preset.cellSize)) return;
      if (cellSize === preset.cellSize) return;
      cellSize = preset.cellSize;
      sldCell.value = String(cellSize);
      valCell.textContent = `${cellSize} px`;
    }

    function openWithState(targetUrl, features) {
      localStorage.setItem(POPUP_STATE_KEY, JSON.stringify(makeSnapshot()));
      const newWindow = window.open(targetUrl, 'life-popout', features);
      if (!newWindow) {
        setStatus('Popup blocked by browser. Allow pop-ups and try again.');
        return false;
      }
      newWindow.focus();
      return true;
    }

    function openPopout(preset) {
      const config = getWindowPreset(preset);
      if (!config) {
        setStatus('Select a frameless preset size first.');
        return;
      }

      const { popupWidth, popupHeight } = popupDimensionsFromPreset(config);
      const features = [
        'popup=yes',
        `width=${popupWidth}`,
        `height=${popupHeight}`,
        'left=80',
        'top=80',
        'resizable=yes',
        'menubar=no',
        'toolbar=no',
        'location=no',
        'status=no',
        'scrollbars=no'
      ].join(',');

      const popupUrl = `${window.location.pathname}?popup=1&preset=${encodeURIComponent(preset)}`;
      if (!openWithState(popupUrl, features)) return;
      window.open('', '_self');
      window.close();
      setStatus('Pop-out opened. If this tab does not close, close it manually.');
    }

    function resizeCurrentPopup(preset) {
      const config = getWindowPreset(preset);
      if (!config) return;
      applyPresetCellSize(config);
      const { popupWidth, popupHeight } = popupDimensionsFromPreset(config);
      window.resizeTo(popupWidth, popupHeight);
      resize();
      setStatus(`Resized to ${config.label} (${config.cols} x ${config.rows}).`);
    }

    function returnFromPopout() {
      const mainUrl = `${window.location.pathname}`;
      localStorage.setItem(POPUP_STATE_KEY, JSON.stringify(makeSnapshot()));
      const mainWindow = window.open(mainUrl, '_blank');
      if (!mainWindow) {
        setStatus('Unable to open main window. Allow pop-ups and try again.');
        return;
      }
      mainWindow.focus();
      window.open('', '_self');
      window.close();
    }

    function restoreFromPopoutState() {
      if (!IN_POPUP_MODE) return;
      const raw = localStorage.getItem(POPUP_STATE_KEY);
      if (!raw) return;

      localStorage.removeItem(POPUP_STATE_KEY);

      try {
        const s = JSON.parse(raw);
        if (!s || !Array.isArray(s.grid)) return;

        cellSize = Number(s.cellSize) || cellSize;
        fps = Number(s.fps) || fps;
        wrapEdges = !!s.wrapEdges;
        if (typeof s.detectLoops === 'boolean') detectLoops = s.detectLoops;
        else if (typeof s.ignoreLoops === 'boolean') detectLoops = !s.ignoreLoops;
        customMode = !!s.customMode;

        sldCell.value = String(cellSize);
        valCell.textContent = `${cellSize} px`;
        sldSpeed.value = String(fps);
        valSpeed.textContent = `${fps} fps`;
        chkWrap.checked = wrapEdges;
        chkDetect.checked = detectLoops;
        selWindow.value = s.windowMode || selWindow.value;
        const preset = getWindowPreset(selWindow.value);
        if (preset) applyPresetCellSize(preset);
        selPattern.value = s.pattern || selPattern.value;
        canvas.classList.toggle('custom-mode', customMode);

        resize();

        const srcRows = Array.isArray(s.grid) ? s.grid.length : 0;
        const srcCols = srcRows > 0 && Array.isArray(s.grid[0]) ? s.grid[0].length : 0;
        if (srcRows > 0 && srcCols > 0) {
          const restored = makeGrid();
          const rowOffsetDst = Math.floor((rows - srcRows) / 2);
          const colOffsetDst = Math.floor((cols - srcCols) / 2);

          for (let r = 0; r < srcRows; r++) {
            const rr = r + rowOffsetDst;
            if (rr < 0 || rr >= rows) continue;
            for (let c = 0; c < srcCols; c++) {
              const cc = c + colOffsetDst;
              if (cc < 0 || cc >= cols) continue;
              restored[rr][cc] = s.grid[r][c] > 0 ? s.grid[r][c] : 0;
            }
          }

          grid = restored;
        }

        generation = Number.isFinite(s.generation) ? s.generation : generation;
        recountPop();
        draw();
        updateStats();

        if (s.running) play();
      } catch {
        // Ignore malformed saved state
      }
    }

    function recountPop() {
      let p = 0;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (grid[r][c] > 0) p++;
      population = p;
    }

    function updateStats() {
      elGen.textContent = generation;
      elPop.textContent = population;
      elGridSize.textContent = `${cols} x ${rows}`;
      requestUrlSync();
    }

    function setStatus(text = '') {
      elStatus.textContent = text;
    }

    function resetRunTiming() {
      runStartTimeMs = 0;
      runStartGeneration = generation;
    }

    function getActualGpsText() {
      if (runStartTimeMs <= 0) return '0.00';

      const elapsedSeconds = (performance.now() - runStartTimeMs) / 1000;
      const generationsAdvanced = generation - runStartGeneration;
      if (elapsedSeconds <= 0 || generationsAdvanced <= 0) return '0.00';

      return (generationsAdvanced / elapsedSeconds).toFixed(2);
    }

    function applyCellSize(newSize) {
      const minSize = parseInt(sldCell.min, 10);
      const maxSize = parseInt(sldCell.max, 10);
      const clamped = Math.max(minSize, Math.min(maxSize, newSize | 0));
      if (clamped === cellSize) return false;

      cellSize = clamped;
      sldCell.value = String(cellSize);
      valCell.textContent = `${cellSize} px`;
      resize();
      requestUrlSync();
      return true;
    }

    function selectedPatternLabel() {
      return selPattern.options[selPattern.selectedIndex]?.text || 'Pattern';
    }

    // ── Grid hashing (fast 32-bit FNV-1a over all cells) ──────────
    function hashGrid(g) {
      let h = 0x811c9dc5;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          h ^= (g[r][c] > 0 ? 1 : 0);
          h = (Math.imul(h, 0x01000193) >>> 0);
        }
      }
      return h;
    }

    function resetLoopHistory() {
      loopHashCount = 0;
      loopHashWrite = 0;
    }

    function pushLoopHash(hash) {
      loopHashes[loopHashWrite] = hash;
      loopHashWrite = (loopHashWrite + 1) % LOOP_TRACK_FRAMES;
      if (loopHashCount < LOOP_TRACK_FRAMES) loopHashCount++;
    }

    function findLoopPeriod(hash) {
      for (let offset = 1; offset <= loopHashCount; offset++) {
        const idx = (loopHashWrite - offset + LOOP_TRACK_FRAMES) % LOOP_TRACK_FRAMES;
        if (loopHashes[idx] === hash) return offset;
      }
      return 0;
    }

    // ── Animation loop ────────────────────────────────────────────
    function loop(ts) {
      if (!running) return;
      animId = requestAnimationFrame(loop);
      if (ts - lastTime >= 1000 / fps) {
        lastTime = ts;

        step();
        draw();
        updateStats();

        const h = hashGrid(grid);
        const period = findLoopPeriod(h);

        if (detectLoops && period === 1) {
          console.log(`[Life] Steady state at gen ${generation}. Auto-pausing.`);
          pause({ statusText: 'Loop detected, paused. (steady state)' });
          return;
        }

        if (detectLoops && period > 1) {
          console.log(`[Life] Period-${period} loop at gen ${generation}. Auto-pausing.`);
          pause({ statusText: `Loop detected, paused. (period-${period})` });
          return;
        }

        pushLoopHash(h);
      }
    }

    function play() {
      if (running) return;
      // Start detection history from the current board state.
      resetLoopHistory();
      pushLoopHash(hashGrid(grid));
      setStatus('');
      runStartTimeMs = performance.now();
      runStartGeneration = generation;
      running = true;
      lastTime = 0;
      btnPlay.classList.add('active');
      btnPause.classList.remove('active');
      animId = requestAnimationFrame(loop);
      requestUrlSync();
    }

    function pause(options = {}) {
      const { statusText = 'Paused.' } = options;
      const wasRunning = running;
      const actualGps = wasRunning ? getActualGpsText() : '';

      running = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      btnPause.classList.add('active');
      btnPlay.classList.remove('active');
      if (statusText) {
        const suffix = wasRunning ? ` Actual speed: ${actualGps} gen/s.` : '';
        setStatus(`${statusText}${suffix}`);
      }
      resetRunTiming();
      requestUrlSync();
    }

    function enterEditMode() {
      pause();
      customPainting = false;
      customMode = true;
      selPattern.value = 'custom';
      canvas.classList.add('custom-mode');
      draw();
    }

    // ── Resize ────────────────────────────────────────────────────
    function resize() {
      const w = canvasArea.clientWidth;
      const h = canvasArea.clientHeight;
      canvas.width  = w;
      canvas.height = h;
      const newCols = Math.floor(w / cellSize);
      const newRows = Math.floor(h / cellSize);
      if (newCols !== cols || newRows !== rows) {
        const hadGrid = grid.length > 0 && cols > 0 && rows > 0;
        const oldGrid = grid;
        const oldCols = cols;
        const oldRows = rows;
        cols = newCols;
        rows = newRows;
        if (hadGrid) {
          grid = resizeGridPreserve(oldGrid, oldCols, oldRows, cols, rows);
          recountPop();
          updateStats();
          resetLoopHistory();
        } else {
          applyPattern();
        }
      }
      draw();
    }

    // ── Event listeners ───────────────────────────────────────────
    btnPlay.addEventListener('click', () => {
      play();
    });

    btnPause.addEventListener('click', () => {
      pause({ statusText: 'Paused.' });
    });

    btnStep.addEventListener('click', () => {
      pause({ statusText: '' });
      step();
      draw();
      updateStats();
      resetRunTiming();
      setStatus('Stepped forward.');
      requestUrlSync();
    });

    btnReset.addEventListener('click', () => {
      pause();
      applyPattern();
      draw();
      if (selPattern.value === 'custom') {
        setStatus('Cleared custom board.');
      } else {
        setStatus(`Cleared ${selectedPatternLabel()} board.`);
      }
    });

    btnEdit.addEventListener('click', () => {
      enterEditMode();
      setStatus('Editing custom pattern.');
      requestUrlSync();
    });

    selWindow.addEventListener('change', () => {
      const mode = selWindow.value;

      if (mode === 'regular') {
        if (IN_POPUP_MODE) returnFromPopout();
        else setStatus('Using regular window.');
        requestUrlSync();
        return;
      }

      if (IN_POPUP_MODE) {
        resizeCurrentPopup(mode);
        requestUrlSync();
        return;
      }

      openPopout(mode);
      requestUrlSync();
    });

    selPattern.addEventListener('change', () => {
      pause();
      customMode = selPattern.value === 'custom';
      canvas.classList.toggle('custom-mode', customMode);
      applyPattern();
      draw();
      requestUrlSync();
    });

    sldSpeed.addEventListener('input', () => {
      fps = parseInt(sldSpeed.value, 10);
      valSpeed.textContent = `${fps} fps`;
      requestUrlSync();
    });

    // Resize only recalculates the grid on mouseup to avoid thrashing
    sldCell.addEventListener('change', () => {
      applyCellSize(parseInt(sldCell.value, 10));
    });

    chkWrap.addEventListener('change', () => {
      wrapEdges = chkWrap.checked;
      requestUrlSync();
    });

    chkDetect.addEventListener('change', () => {
      detectLoops = chkDetect.checked;
      requestUrlSync();
    });

    chkUrlSync.addEventListener('change', () => {
      urlSyncEnabled = chkUrlSync.checked;
      syncStateToUrl();
      if (urlSyncEnabled) setStatus('URL now contains the current grid and settings.');
      else setStatus('URL state removed.');
    });

    // ── Custom draw mode ──────────────────────────────────────────
    function canvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        c: Math.floor((e.clientX - rect.left) * (canvas.width  / rect.width)  / cellSize),
        r: Math.floor((e.clientY - rect.top)  * (canvas.height / rect.height) / cellSize)
      };
    }

    canvas.addEventListener('pointerdown', e => {
      if (!customMode || running) return;
      const { c, r } = canvasCoords(e);
      if (c < 0 || c >= cols || r < 0 || r >= rows) return;
      customPaintVal = grid[r][c] > 0 ? 0 : 1;
      grid[r][c] = customPaintVal;
      customPainting = true;
      canvas.setPointerCapture(e.pointerId);
      recountPop(); updateStats(); draw();
    });

    canvas.addEventListener('pointermove', e => {
      const { c, r } = canvasCoords(e);
      if (c < 0 || c >= cols || r < 0 || r >= rows) {
        elHover.textContent = 'Hover: x -, y -';
        return;
      }
      elHover.textContent = `Hover: x ${c}, y ${r}`;
    });

    canvas.addEventListener('pointermove', e => {
      if (!customMode || !customPainting) return;
      const { c, r } = canvasCoords(e);
      if (c < 0 || c >= cols || r < 0 || r >= rows) return;
      if (grid[r][c] === customPaintVal) return;
      grid[r][c] = customPaintVal;
      recountPop(); updateStats(); draw();
    });

    canvas.addEventListener('pointerup',     () => { customPainting = false; });
    canvas.addEventListener('pointercancel', () => { customPainting = false; });
    canvas.addEventListener('pointerleave',  () => { elHover.textContent = 'Hover: x -, y -'; });

    canvas.addEventListener('wheel', e => {
      if (running) return;

      e.preventDefault();
      const delta = Math.sign(e.deltaY);
      if (delta === 0) return;

      // Scroll up increases cell size, scroll down decreases it.
      applyCellSize(cellSize - delta);
    }, { passive: false });

    new ResizeObserver(resize).observe(canvasArea);

    // ── Init ──────────────────────────────────────────────────────
    if (IN_POPUP_MODE) {
      const queryPreset = new URLSearchParams(window.location.search).get('preset');
      if (queryPreset && getWindowPreset(queryPreset)) {
        selWindow.value = queryPreset;
        applyPresetCellSize(getWindowPreset(queryPreset));
      }
      else selWindow.value = 'regular';
    } else {
      selWindow.value = 'regular';
    }
    resize();
    restoreFromPopoutState();
    tryRestoreFromUrlState();
    if (urlSyncEnabled) syncStateToUrl();
  </script>

</body>

</html>
